name: Validate Little Alchemist

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check JavaScript syntax
        run: |
          node --check config.js
          node --check app.js
          node --check recipes.js
          node --check recipe-factory.js
          for file in recipes-common-*.js; do node --check "$file"; done
          node --check diagrams.js
          node --check chemistry-data.js
          for file in chemistry-elements-*.js; do node --check "$file"; done
          node --check chemistry-reactions.js
          node --check advanced-alchemy.js
          node --check pharmacy-data.js
          for file in pharmacy-modules-*.js; do node --check "$file"; done
          node --check pharmacy-alchemy.js
          node --check service-worker.js
          node --check api/generate.js

      - name: Validate recipe library
        run: |
          node <<'NODE'
          global.window = {};
          require('./recipes.js');
          require('./recipe-factory.js');
          for (let index = 1; index <= 13; index += 1) {
            require(`./recipes-common-${String(index).padStart(2, '0')}.js`);
          }
          require('./diagrams.js');

          const recipes = window.LITTLE_ALCHEMIST_RECIPES;
          if (!Array.isArray(recipes)) throw new Error('Recipe library is missing');
          if (recipes.length !== 107) throw new Error(`Expected 107 recipes, received ${recipes.length}`);

          const ids = new Set();
          const titles = new Set();
          for (const recipe of recipes) {
            if (!recipe.id || !recipe.title) throw new Error('Recipe missing id or title');
            if (ids.has(recipe.id)) throw new Error(`Duplicate recipe id: ${recipe.id}`);
            if (titles.has(recipe.title)) throw new Error(`Duplicate recipe title: ${recipe.title}`);
            ids.add(recipe.id);
            titles.add(recipe.title);
            if (!Array.isArray(recipe.materials) || recipe.materials.length < 2) throw new Error(`${recipe.id} needs materials`);
            if (!Array.isArray(recipe.steps) || recipe.steps.length < 3) throw new Error(`${recipe.id} needs steps`);
            if (!recipe.principle || !Array.isArray(recipe.safety) || recipe.safety.length === 0) throw new Error(`${recipe.id} lacks guidance`);
            const diagram = recipe.diagram || window.LITTLE_ALCHEMIST_DIAGRAMS?.[recipe.id];
            if (!Array.isArray(diagram) || diagram.length !== 3) throw new Error(`${recipe.id} needs three diagram stages`);
          }

          const slime = recipes.find(recipe => recipe.id === 'classic-slime');
          if (!slime || !slime.aliases.includes('史萊姆')) throw new Error('Classic slime recipe is missing');
          console.log(`Validated ${recipes.length} unique recipes.`);
          NODE

      - name: Validate chemistry library
        run: |
          node <<'NODE'
          global.window = {};
          require('./chemistry-data.js');
          for (let index = 1; index <= 4; index += 1) {
            require(`./chemistry-elements-${String(index).padStart(2, '0')}.js`);
          }
          require('./chemistry-reactions.js');

          const chemistry = window.LITTLE_ALCHEMIST_CHEMISTRY;
          if (!chemistry || chemistry.elements.length !== 118) {
            throw new Error(`Expected 118 elements, received ${chemistry?.elements?.length}`);
          }
          if (chemistry.reactions.length !== 30) {
            throw new Error(`Expected 30 reactions, received ${chemistry.reactions.length}`);
          }

          const numbers = new Set();
          const symbols = new Set();
          for (const element of chemistry.elements) {
            if (numbers.has(element.number)) throw new Error(`Duplicate atomic number: ${element.number}`);
            if (symbols.has(element.symbol)) throw new Error(`Duplicate symbol: ${element.symbol}`);
            if (element.number < 1 || element.number > 118) throw new Error(`Invalid atomic number: ${element.number}`);
            if (element.period < 1 || element.period > 7) throw new Error(`Invalid period: ${element.symbol}`);
            if (element.group < 1 || element.group > 18) throw new Error(`Invalid group: ${element.symbol}`);
            if (!element.name || !element.mass || !element.intro) throw new Error(`Incomplete element: ${element.symbol}`);
            numbers.add(element.number);
            symbols.add(element.symbol);
          }

          for (const reaction of chemistry.reactions) {
            if (!reaction.title || !reaction.equation.includes('→')) throw new Error('Incomplete reaction equation');
            if (!reaction.category || !reaction.observation || !reaction.concept) throw new Error(`Incomplete reaction: ${reaction.title}`);
          }
          console.log('Validated 118 elements and 30 chemistry equations.');
          NODE

      - name: Validate pharmacy library
        run: |
          node <<'NODE'
          global.window = {};
          require('./pharmacy-data.js');
          for (let index = 1; index <= 4; index += 1) {
            require(`./pharmacy-modules-${String(index).padStart(2, '0')}.js`);
          }

          const pharmacy = window.LITTLE_ALCHEMIST_PHARMACY;
          if (!pharmacy) throw new Error('Pharmacy library is missing');
          if (Object.keys(pharmacy.categories).length !== 8) throw new Error('Expected 8 pharmacy categories');
          if (pharmacy.paths.length !== 6) throw new Error(`Expected 6 learning paths, received ${pharmacy.paths.length}`);
          if (pharmacy.modules.length !== 48) throw new Error(`Expected 48 pharmacy modules, received ${pharmacy.modules.length}`);

          const ids = new Set();
          const titles = new Set();
          for (const module of pharmacy.modules) {
            if (!module.id || !module.title || !module.summary) throw new Error('Incomplete pharmacy module');
            if (ids.has(module.id)) throw new Error(`Duplicate pharmacy id: ${module.id}`);
            if (titles.has(module.title)) throw new Error(`Duplicate pharmacy title: ${module.title}`);
            if (!pharmacy.categories[module.category]) throw new Error(`Unknown pharmacy category: ${module.category}`);
            if (!Array.isArray(module.concepts) || module.concepts.length < 3) throw new Error(`${module.id} needs at least three concepts`);
            if (!module.safety) throw new Error(`${module.id} needs a safety boundary`);
            ids.add(module.id);
            titles.add(module.title);
          }

          for (const path of pharmacy.paths) {
            if (!path.id || !path.title || !Array.isArray(path.modules) || path.modules.length < 4) {
              throw new Error('Incomplete pharmacy learning path');
            }
            for (const moduleId of path.modules) {
              if (!ids.has(moduleId)) throw new Error(`Learning path references missing module: ${moduleId}`);
            }
          }
          console.log('Validated 48 pharmacy modules across 8 categories and 6 learning paths.');
          NODE

      - name: Check JSON files
        run: |
          python -m json.tool manifest.webmanifest > /dev/null
          python -m json.tool vercel.json > /dev/null

      - name: Verify required files and tabs
        run: |
          test -f index.html
          test -f styles.css
          test -f enhancements.css
          test -f advanced-alchemy.css
          test -f advanced-alchemy.js
          test -f chemistry-data.js
          test "$(find . -maxdepth 1 -name 'chemistry-elements-*.js' | wc -l)" -eq 4
          test -f chemistry-reactions.js
          test -f pharmacy-data.js
          test "$(find . -maxdepth 1 -name 'pharmacy-modules-*.js' | wc -l)" -eq 4
          test -f pharmacy-alchemy.css
          test -f pharmacy-alchemy.js
          test -f api/generate.js
          grep -q 'id="recipeTab"' index.html
          grep -q 'id="advancedTab"' index.html
          grep -q 'id="pharmacyTab"' index.html
          grep -q 'id="periodicTable"' index.html
          grep -q 'id="reactionGrid"' index.html
          grep -q 'id="pharmacyGrid"' index.html
          grep -q 'id="pharmacyDetail"' index.html